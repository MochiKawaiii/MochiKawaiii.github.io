<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e27">
    <meta name="description"
        content="Automate your Bing searches on mobile. Earn Microsoft Rewards points effortlessly.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Bing Search Automator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
</head>

<body>
    <div class="app-container">
        <!-- Animated Background -->
        <div class="bg-particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <!-- Header -->
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" />
                        <circle cx="17" cy="17" r="8" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" />
                        <line x1="23" y1="23" x2="32" y2="32" stroke="url(#logoGrad)" stroke-width="2.5"
                            stroke-linecap="round" />
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#00aaff" />
                                <stop offset="100%" stop-color="#0066ff" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Bing Search Automator</h1>
                    <p class="subtitle">Automate your Bing searches</p>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Settings Card -->
            <div class="settings-card">
                <div class="input-group">
                    <label for="searchCount">
                        <span class="label-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00aaff"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                        </span>
                        <span class="label-text">Number of searches</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="number" id="searchCount" min="1" max="100" value="30" placeholder="30">
                        <span class="input-hint">1-100</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="interval">
                        <span class="label-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00aaff"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </span>
                        <span class="label-text">Interval (seconds)</span>
                    </label>
                    <div class="input-wrapper">
                        <input type="number" id="interval" min="3" max="60" value="10" placeholder="10">
                        <span class="input-hint">3-60s</span>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button id="startBtn" class="action-btn">
                <span class="btn-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                </span>
                <span class="btn-text">Start Searches</span>
            </button>

            <!-- Progress Section (hidden by default) -->
            <div id="progressSection" class="progress-section hidden">
                <div class="progress-header">
                    <span class="progress-label">Progress</span>
                    <span id="progressCount" class="progress-count">0 / 30</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div id="currentQuery" class="current-query">
                    <span class="query-label">Current:</span>
                    <span id="queryText" class="query-text">Waiting...</span>
                </div>
            </div>

            <!-- Search Log -->
            <div id="logSection" class="log-section hidden">
                <div class="log-header">
                    <span class="log-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00aaff" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        Search Log
                    </span>
                    <button id="clearLogBtn" class="clear-log-btn">Clear</button>
                </div>
                <div id="logList" class="log-list"></div>
            </div>

            <!-- Status Message -->
            <div id="statusMessage" class="status-message hidden">
                <div class="status-icon">✅</div>
                <div class="status-text">All searches completed!</div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="footer-badges">
                <span class="badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00cc88" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                    No ads
                </span>
                <span class="badge-divider">|</span>
                <span class="badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00cc88" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                        <line x1="1" y1="1" x2="23" y2="23" stroke="#00cc88" stroke-width="2.5"></line>
                    </svg>
                    No tracking
                </span>
                <span class="badge-divider">|</span>
                <span class="badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00cc88" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                    Open Source
                </span>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => { });
        }
    </script>
</body>

</html>
